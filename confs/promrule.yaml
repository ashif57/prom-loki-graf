apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cpu-high-alert
  namespace: monitoring
spec:
  groups:
    - name: cpu.rules
      rules:
        - alert: HighCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{container!="",pod!=""}[1m])) > 0.01
          for: 10s
          labels:
            severity: warning
            source: prometheus
          annotations:
            summary: "High CPU usage detected"
            description: "CPU usage is above threshold for 30 seconds"
